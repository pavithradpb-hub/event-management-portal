<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Event Management Portal</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Header -->

    <header>

        <h1>🎉 Event Management Portal</h1>

        <button id="themeBtn">🌙 Dark Mode</button>

    </header>

    <!-- Dashboard -->

    <section class="dashboard">

        <div class="card">
            <h2 id="totalEvents">0</h2>
            <p>Total Events</p>
        </div>

        <div class="card">
            <h2 id="upcomingEvents">0</h2>
            <p>Upcoming</p>
        </div>

        <div class="card">
            <h2 id="completedEvents">0</h2>
            <p>Completed</p>
        </div>

    </section>

    <!-- Controls -->

    <section class="controls">

        <input
            type="text"
            id="search"
            placeholder="🔍 Search Events">

        <select id="filterCategory">

            <option value="All">All Categories</option>

            <option value="Conference">Conference</option>

            <option value="Workshop">Workshop</option>

            <option value="Seminar">Seminar</option>

            <option value="Sports">Sports</option>

            <option value="Cultural">Cultural</option>

        </select>

        <button id="sortBtn">
            📅 Sort by Date
        </button>

        <button id="addBtn">
            ➕ Add Event
        </button>

    </section>

    <!-- Event List -->

    <section id="eventContainer">

    </section>

    <!-- Add/Edit Popup -->

    <div class="popup" id="popup">

        <div class="popup-content">

            <h2 id="popupTitle">Add Event</h2>

            <input
                type="text"
                id="eventName"
                placeholder="Event Name">

            <textarea
                id="description"
                rows="3"
                placeholder="Description"></textarea>

            <input
                type="date"
                id="eventDate">

            <input
                type="time"
                id="eventTime">

            <input
                type="text"
                id="venue"
                placeholder="Venue">

            <select id="category">

                <option value="Conference">Conference</option>

                <option value="Workshop">Workshop</option>

                <option value="Seminar">Seminar</option>

                <option value="Sports">Sports</option>

                <option value="Cultural">Cultural</option>

            </select>

            <input
                type="text"
                id="organizer"
                placeholder="Organizer">

            <input
                type="number"
                id="capacity"
                placeholder="Maximum Capacity">

            <input
                type="number"
                id="registered"
                placeholder="Registered Participants">

            <div class="popup-buttons">

                <button id="saveBtn">
                    Save Event
                </button>

                <button id="cancelBtn">
                    Cancel
                </button>

            </div>

        </div>

    </div>

    <!-- Template for Event Card -->

    <template id="eventTemplate">

        <div class="event-card">

            <div class="top">

                <h3 class="event-title"></h3>

                <span class="status"></span>

            </div>

            <p class="description"></p>

            <p>📅 <span class="date"></span></p>

            <p>🕒 <span class="time"></span></p>

            <p>📍 <span class="venue"></span></p>

            <p>📂 <span class="category"></span></p>

            <p>👤 <span class="organizer"></span></p>

            <p>👥 <span class="capacity"></span></p>

            <p class="countdown"></p>

            <div class="actions">

                <button class="editBtn">
                    Edit
                </button>

                <button class="deleteBtn">
                    Delete
                </button>

            </div>

        </div>

    </template>

    <script src="script.js"></script>

</body>

</html>
